version: '3.9'

volumes:
  caddy_data:
  caddy_config:
  directus_uploads:
  directus_database:
  directus_extensions:
  postgresql_data:
  redis_data:


services:
  #####################################################
  # Reverse proxy
  #####################################################
  caddy:
    image: caddy:2.6.4-alpine
    restart: unless-stopped
    ports: [ "80:80", "443:443", "443:443/udp" ]
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - $PWD/Caddyfile:/etc/caddy/Caddyfile

  #####################################################
  # Database & Cache
  #####################################################
  database:
    image: postgres:15.2-alpine
    volumes: [ postgresql_data:/var/lib/postgresql/data ]
    environment:
      POSTGRES_DB: 'directus'
      POSTGRES_USER: 'directus'
      POSTGRES_PASSWORD: 'directus'

  cache:
    image: redis:7.0.9
    volumes: [ redis_data:/data ]

  #####################################################
  # Directus
  #####################################################
  directus:
    image: directus/directus:9.23.1
    volumes:
      - directus_uploads:/directus/uploads
      - directus_database:/directus/database
      - directus_extensions:/directus/extensions
    depends_on: [ cache, database ]
    environment:
      KEY: '5296818e-ecd4-410b-86d9-2cd15bf8f73d'
      SECRET: '6e80eff4-f002-4b91-8a61-99c6d384e8c2'

      DB_CLIENT: 'pg'
      DB_HOST: 'database'
      DB_PORT: '5432'
      DB_DATABASE: 'directus'
      DB_USER: 'directus'
      DB_PASSWORD: 'directus'

      CACHE_ENABLED: 'true'
      CACHE_STORE: 'redis'
      CACHE_REDIS: 'redis://cache:6379'

      ADMIN_EMAIL: 'admin@beesincubator.com'
      ADMIN_PASSWORD: '10f33a4c-74af-4e21-9c0d-8fb355b37d74'
      # Make sure to set this in production
      # (see https://docs.directus.io/self-hosted/config-options#general)
      # PUBLIC_URL: 'https://directus.example.com'
